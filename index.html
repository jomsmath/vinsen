<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baptism Invitation | Vinsen Vindhu Varkichen</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Cormorant Garamond', serif;
    color: #3a2a0c;
    overflow-x: hidden;

    background-image:
        linear-gradient(rgba(252, 247, 236, 0.82), rgba(252, 247, 236, 0.82)),
        url("background.png");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

#welcomeScreen {
    position: fixed;
    inset: 0;

    background:
        linear-gradient(rgba(255, 248, 223, 0.86), rgba(245, 227, 176, 0.86)),
        url("background.png");

    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
    padding: 20px;
}

.welcome-content {
    text-align: center;
    max-width: 500px;

    background: rgba(255, 255, 255, 0.65);
    padding: 35px 25px;
    border-radius: 25px;

    box-shadow: 0 10px 35px rgba(0,0,0,.12);
}

.welcome-content h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 4rem;
    color: #b8860b;
    margin-bottom: 15px;
}

.welcome-content p {
    font-size: 1.3rem;
    margin-bottom: 30px;
}

.open-btn {
    padding: 16px 40px;
    border: none;
    border-radius: 50px;

    background: #b8860b;
    color: white;

    font-size: 1.1rem;
    cursor: pointer;

    box-shadow: 0 8px 18px rgba(0,0,0,.18);
}

.open-btn:hover {
    background: #9d7208;
}

#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;

    z-index: 999;

    background: #b8860b;
    color: white;

    border: none;
    border-radius: 30px;

    padding: 12px 20px;
    font-size: 1rem;

    cursor: pointer;
    display: none;

    box-shadow: 0 8px 18px rgba(0,0,0,.18);
}

.hero {
    padding: 70px 20px;
    text-align: center;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 5rem;
    color: #b8860b;
}

.hero p {
    font-size: 1.4rem;
    margin-top: 10px;
}

.hero .name {
    font-size: 3rem;
    font-weight: 700;
    margin-top: 20px;
}

.section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: auto;
}

.section-title {
    text-align: center;
    font-size: 2.8rem;
    color: #b8860b;
    margin-bottom: 35px;
}

.single-photo-box {
    max-width: 850px;
    margin: auto;
    overflow: hidden;

    border-radius: 25px;
    box-shadow: 0 10px 35px rgba(0,0,0,.18);

    background: rgba(255,255,255,.65);
    padding: 10px;
}

.single-photo-box img {
    width: 100%;
    display: block;
    border-radius: 18px;
}

.countdown {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}

.time-box {
    background: #b8860b;
    color: white;

    padding: 20px;
    border-radius: 15px;
    width: 110px;

    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,.14);
}

.time-box span {
    font-size: 2rem;
    font-weight: bold;
    display: block;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    gap: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.82);

    padding: 30px;
    border-radius: 20px;

    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,.10);
}

.card h3 {
    color: #b8860b;
    margin-bottom: 15px;
    font-size: 1.5rem;
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 1.15rem;
    line-height: 1.5;
}

.map-btn {
    display: inline-block;
    margin-top: 15px;

    padding: 12px 24px;

    background: #b8860b;
    color: white;

    text-decoration: none;
    border-radius: 30px;
}

.map-btn:hover {
    background: #9d7208;
}

.blessing {
    max-width: 700px;
    margin: auto;

    text-align: center;
    font-size: 1.4rem;
    font-style: italic;
    line-height: 1.8;

    background: rgba(255,255,255,.75);
    padding: 30px;
    border-radius: 20px;

    box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.footer {
    padding: 60px 20px;
    text-align: center;

    background: rgba(245, 236, 213, 0.82);
}

.footer h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5rem;
    color: #b8860b;
}

.footer p {
    font-size: 1.8rem;
    margin-top: 10px;
}

@media(max-width:768px) {
    body {
        background-attachment: scroll;
    }

    .hero h1 {
        font-size: 3.5rem;
    }

    .hero .name {
        font-size: 2.2rem;
    }

    .welcome-content h1 {
        font-size: 3rem;
    }

    .section-title {
        font-size: 2.2rem;
    }

    .time-box {
        width: 90px;
        padding: 15px;
    }

    .time-box span {
        font-size: 1.6rem;
    }
}
</style>
</head>

<div id="welcomeScreen">
    <div class="welcome-content">
        <h1>Vinsen's Baptism</h1>
        <p>Join us as we celebrate this blessed occasion.</p>

        <button class="open-btn" onclick="openInvitation()">
            Open Invitation
        </button>
    </div>
</div>
